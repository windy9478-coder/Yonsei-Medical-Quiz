name: Build and Release Quiz App

on:
  push:
    tags:
      - 'v*' # v1.2.4 처럼 태그를 푸시할 때만 작동

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # [필수] 서버에 필요한 라이브러리 설치
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests Pillow pyinstaller

      # [필수] OS별 빌드 (아이콘 및 로고 포함)
      - name: Build with PyInstaller
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            # 윈도우용 세팅
            pyinstaller --noconsole --onefile \
            --icon="icon.ico" \
            --add-data "기본형_심볼-03.jpg;." \
            --add-data "icon.ico;." \
            --name "연세_의학용어_마스터" Voca.py
          else
            # 맥용 세팅
            pyinstaller --windowed --onefile \
            --icon="icon.ico" \
            --add-data "기본형_심볼-03.jpg:." \
            --add-data "icon.ico:." \
            --name "연세_의학용어_마스터" Voca.py
            cd dist
            zip -r Voca_Mac.zip 연세_의학용어_마스터.app
          fi

      # [배포] 만들어진 파일을 깃허브 Release 페이지에 업로드
      - name: Release App
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/연세_의학용어_마스터.exe
            dist/Voca_Mac.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
