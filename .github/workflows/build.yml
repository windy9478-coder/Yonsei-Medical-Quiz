name: Build and Release Quiz App

# 1. 언제 실행할지 결정 (태그를 새로 생성할 때 실행됨)
on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    # 윈도우와 맥OS 두 환경 모두에서 돌리겠다는 설정
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
    
    runs-on: ${{ matrix.os }}

    steps:
      # 2. 깃허브 서버로 내 코드를 가져옴
      - name: Checkout code
        uses: actions/checkout@v3

      # 3. 파이썬 설치
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # 4. 필요한 도구(라이브러리) 설치
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller Pillow requests

      # 5. 실행 파일 만들기 (OS별로 명령어가 살짝 다름)
      - name: Build with PyInstaller
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            pyinstaller --noconsole --onefile --add-data "기본형_심볼-03.jpg;." --icon=icon.ico Voca.py
          else
            pyinstaller --windowed --onefile --add-data "기본형_심볼-03.jpg:." Voca.py
          fi
        shell: bash

      # 6. 결과물을 깃허브 릴리즈 페이지에 업로드
      - name: Release App
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/Voca.exe
            dist/Voca.app
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
