name: Build and Release Quiz App

on:
  push:
    tags:
      - 'v*'

# 이 권한 설정이 핵심이야!
permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
    
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # v3 -> v4로 업데이트

      - name: Set up Python
        uses: actions/setup-python@v5 # v4 -> v5로 업데이트
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller Pillow requests

   # 5. 실행 파일 만들기 (맥용은 압축 과정 추가!)
      - name: Build with PyInstaller
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            pyinstaller --noconsole --onefile --add-data "기본형_심볼-03.jpg;." Voca.py
          else
            # 맥용 빌드 후 폴더를 ZIP으로 압축
            pyinstaller --windowed --onefile --add-data "기본형_심볼-03.jpg:." Voca.py
            cd dist && zip -r Voca_Mac.zip Voca.app
          fi
        shell: bash

      # 6. 결과물 업로드 (맥용은 zip 파일을 올리도록 수정)
      - name: Release App
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/Voca.exe
            dist/Voca_Mac.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
