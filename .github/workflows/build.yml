name: Build and Release Quiz App

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests Pillow pyinstaller

      # [중요] 기존의 중복된 배포본이 있다면 먼저 삭제해서 충돌 방지
      - name: Delete old release
        uses: dev-drprasad/delete-tag-and-release@v1.1.0
        with:
          tag_name: latest-build
          delete_release: true
          github_token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true # 처음 빌드할 때는 삭제할 게 없으니 에러 무시

      - name: Build with PyInstaller
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            pyinstaller --noconsole --onefile \
            --icon="icon.ico" \
            --add-data "기본형_심볼-03.jpg;." \
            --add-data "icon.ico;." \
            --name "연세_의학용어_마스터" Voca.py
          else
            pyinstaller --windowed --onefile \
            --icon="icon.ico" \
            --add-data "기본형_심볼-03.jpg:." \
            --add-data "icon.ico:." \
            --name "연세_의학용어_마스터" Voca.py
            cd dist
            zip -r Voca_Mac.zip 연세_의학용어_마스터.app
          fi

      - name: Create New Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-build
          name: "Latest Medical Quiz Build"
          files: |
            dist/연세_의학용어_마스터.exe
            dist/Voca_Mac.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
